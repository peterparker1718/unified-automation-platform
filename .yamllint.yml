# YAML Lint Configuration
extends: default

rules:
  # Line length
  line-length:
    max: 120
    level: warning

  # Comments
  comments:
    min-spaces-from-content: 1

  # Indentation
  indentation:
    spaces: 2

  # Key duplicates
  key-duplicates: enable

  # Trailing spaces
  trailing-spaces: enable

  # Truthy values
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']

ignore: |
  node_modules/
  .git/
  frontend/build/
  backend/__pycache__/
  *.pyc