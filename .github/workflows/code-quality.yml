name: Code Quality and Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Install Python linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy pylint

    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Python code formatting check
      run: |
        cd backend
        black --check --diff .

    - name: Python import sorting check
      run: |
        cd backend
        isort --check-only --diff .

    - name: Python linting with flake8
      run: |
        cd backend
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Python type checking
      run: |
        cd backend
        mypy . --ignore-missing-imports

    - name: Python linting with pylint
      run: |
        cd backend
        pylint --exit-zero $(find . -name "*.py" | grep -v __pycache__ | head -10)

    - name: Install frontend dependencies
      run: |
        if [ -f "frontend/package.json" ]; then
          cd frontend
          npm ci
        fi

    - name: Frontend linting
      run: |
        if [ -f "frontend/package.json" ]; then
          cd frontend
          npm run lint
        fi

    - name: TypeScript type checking
      run: |
        if [ -f "frontend/package.json" ]; then
          cd frontend
          npx tsc --noEmit
        fi

  prettier-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Install Prettier
      run: npm install -g prettier

    - name: Check frontend formatting
      run: |
        if [ -f "frontend/package.json" ]; then
          cd frontend
          prettier --check "src/**/*.{js,jsx,ts,tsx,css,md}"
        fi

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Lint Markdown files
      uses: DavidAnson/markdownlint-cli2-action@v13
      with:
        globs: '**/*.md'

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Lint YAML files
      uses: ibiqlik/action-yamllint@v3
      with:
        file_or_dir: .
        config_file: .yamllint.yml
        strict: false

  dockerfile-lint:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'Dockerfile') || github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4

    - name: Lint Dockerfile
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile
        failure-threshold: warning